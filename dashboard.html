<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAudit | Dashboard</title>
    <meta name="description" content="View global waste contributions and real-time E-Waste metrics.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Phase 5 Bonus: Three.js and Globe.gl -->
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <span>🌍</span> EcoAudit
        </a>
        <nav class="nav-links">
            <a href="index.html">Log Waste</a>
            <a href="dashboard.html" class="active">Dashboard</a>
        </nav>
    </header>

    <main>
        <div class="dashboard-header">
            <div>
                <h1 style="text-align: left; margin-bottom: 0.5rem;">Audit Dashboard</h1>
                <p style="color: var(--text-muted); margin: 0;">Real-time feed of waste logged globally.</p>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total E-Waste Logged</div>
                <div class="stat-value"><span id="total-ewaste">0.00</span> <span>kg</span></div>
            </div>
        </div>

        <div id="feed-container" class="feed-grid">
            <div class="loading">Loading live feed... 🔄</div>
        </div>

        <div class="map-container">
            <h2>Global Log Map</h2>
            <div id="map"></div>
        </div>
    </main>

    <!-- Phase 5 Bonus: Three.js and Globe.gl included in head -->
    
    <!-- Core App Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
